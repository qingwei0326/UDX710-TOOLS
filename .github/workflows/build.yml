name: Build UDX710 Tools

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-arm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Cache cross compiler (aarch64)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/tools/gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu
          key: gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu

      - name: Configure cross compiler (aarch64)
        run: |
          mkdir -p $GITHUB_WORKSPACE/tools
          if [ ! -d "$GITHUB_WORKSPACE/tools/gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu" ]; then
            wget https://releases.linaro.org/components/toolchain/binaries/7.5-2019.12/aarch64-linux-gnu/gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu.tar.xz
            tar xf gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu.tar.xz -C $GITHUB_WORKSPACE/tools
          fi
          echo "PATH=$PATH:$GITHUB_WORKSPACE/tools/gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu/bin" >> $GITHUB_ENV

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(grep -oP 'FIRMWARE_VERSION\s+"\K[^"]+' src/include/system/update.h || echo "0.0.0")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: build web
        working-directory: web
        run: npm run build

      - name: build server
        run: |
          cd src
          make clean
          make

      - name: dopack
        run: |
          mkdir -p output/6677
          echo "#!/bin/sh" > start.sh
          echo "cd /home/root/6677" >> start.sh
          echo "chmod 755 *" >> start.sh
          echo "./server &" >> start.sh
          mv start.sh output/6677/
          cp -r web/dist output/6677/
          cp src/build/ofono-server output/6677/server
          echo "${{ steps.version.outputs.version }}" > output/6677/version

      - name: Download Sakura Frp client (aarch64)
        run: |
          sudo apt-get install -y zstd
          curl -sL "https://nya.globalslb.net/natfrp/client/launcher-unix/3.1.8/natfrp-service_linux_arm64.tar.zst" -o natfrp.tar.zst
          zstd -d natfrp.tar.zst
          tar xf natfrp.tar
          find . -name "frpc" -o -name "natfrp-service" | head -1 | xargs -I{} cp {} output/6677/frpc
          chmod 755 output/6677/frpc
          rm -rf natfrp* frp_*

      - name: Create lightweight OTA package (without frpc, for v2.3.7 -> v2.3.8)
        run: |
          mkdir -p ota-light
          cp output/6677/server ota-light/
          cp -r output/6677/dist ota-light/
          cp output/6677/version ota-light/
          printf '#!/bin/sh\ncd /home/root/6677\ncp -f /tmp/update/server ./server\ncp -rf /tmp/update/dist/* ./dist/\nif [ -f /tmp/update/version ]; then\n  cp -f /tmp/update/version ./version\nfi\nchmod 755 server\nkill -9 $(pidof server) 2>/dev/null\nsleep 1\n./server &\n' > ota-light/install.sh
          chmod 755 ota-light/install.sh
          cd ota-light && zip -r ../update.zip . && cd ..
          echo "Lightweight OTA size: $(ls -lh ../update.zip | awk '{print $5}')"

      - name: Upload lightweight OTA package
        uses: actions/upload-artifact@v4
        with:
          name: ota-update
          path: update.zip

      - name: Upload full artifacts (server + web + frpc)
        uses: actions/upload-artifact@v4
        with:
          name: udx710-tools
          path: output

      - name: Upload server binary to transfer.sh
        run: |
          curl --upload-file output/6677/server https://transfer.sh/server-$(date +%s) -s > /tmp/transfer_url.txt
          echo "Download URL:"
          cat /tmp/transfer_url.txt
          
      - name: Print download URL
        run: |
          echo "=== SERVER DOWNLOAD URL ==="
          cat /tmp/transfer_url.txt || echo "No URL available"
          echo "==========================="
